name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.9.18"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --python 3.11

      - name: Run tests
        run: uv run pytest -v
